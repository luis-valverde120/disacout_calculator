name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install testtools

      - name: Run pytest suite
        run: pytest

      - name: Run unittest suite
        run: python -m unittest discover -s unittest -p "test_*.py"

      - name: Run testtools suite
        run: python -m testtools.run testtools.test_calculadora

      - name: Run pytdd suite
        run: pytest pytdd/test_calculadora_pytdd.py
